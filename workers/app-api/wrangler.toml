name = "tiko-app-api"
main = "src/index.ts"
compatibility_date = "2026-05-27"

[vars]
ALLOWED_ORIGINS = "*"
# Set TOKEN_PEPPER with `wrangler secret put TOKEN_PEPPER`; it must match identity-api.

[[d1_databases]]
binding = "APP_DB"
database_name = "tiko-app-data"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[d1_databases]]
binding = "IDENTITY_DB"
database_name = "tiko-identity"
database_id = "00000000-0000-0000-0000-000000000000"
