name = "tiko-admin-api-dev"
main = "src/index.ts"
compatibility_date = "2026-05-27"
account_id = "dc2b7d14a69351375cab6de9a13ddee9"
workers_dev = true

[[d1_databases]]
binding = "AUTH_DB"
database_name = "tiko-identity"
database_id = "036a1726-ac16-48a9-ab76-22c3a88ca7ae"

[[d1_databases]]
binding = "APP_DB"
database_name = "tiko-db"
database_id = "f99b61ae-6a78-4670-bb9c-cdc4f634264a"
migrations_dir = "../app-api/migrations"

[[services]]
binding = "IDENTITY_SERVICE"
service = "tiko-identity-api-dev"

[[secrets_store_secrets]]
binding = "PEPPER_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "TOKEN_PEPPER"

[[secrets_store_secrets]]
binding = "COMMUNICATION_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "COMMUNICATION_API_KEY"

[vars]
TIKO_ENVIRONMENT = "development"
ADMIN_EMAIL = "me@sil.mt"
IDENTITY_BASE_URL = "https://api.tikotalks.com/v1"
APP_API_URL = "https://dev.api.tikotalks.com/v1/apps"
GENERATION_API_URL = "https://dev-api.tikotalks.com/v1/generation"
MEDIA_API_URL = "https://media-api.tikotalks.com/v1"
COMMUNICATION_API_URL = "https://dev.api.tikotalks.com/v1/communication"
TRANSLATIONS_API_URL = "https://tiko-translations-api-dev.silvandiepen.workers.dev/v1"

# Secrets:
# TOKEN_PEPPER — same pepper as identity-api, required for email hash verification
# COMMUNICATION_API_KEY — service key for communication-api proxy calls
# TRANSLATIONS_API_KEY — ApiKey accepted by translations-api for Lezu sync

# ── Production environment ──────────────────────────────────────
# Deploy with: npx wrangler deploy --env production

[triggers]
crons = ["0 3 * * *"]

# ── Production environment ──────────────────────────────────────
# Deploy with: npx wrangler deploy --env production

[env.production]
name = "tiko-admin-api"
workers_dev = false

[[env.production.d1_databases]]
binding = "AUTH_DB"
database_name = "tiko-identity"
database_id = "036a1726-ac16-48a9-ab76-22c3a88ca7ae"

[[env.production.d1_databases]]
binding = "APP_DB"
database_name = "tiko-db"
database_id = "f99b61ae-6a78-4670-bb9c-cdc4f634264a"
migrations_dir = "../app-api/migrations"

[[env.production.services]]
binding = "IDENTITY_SERVICE"
service = "tiko-identity-api"

[[env.production.secrets_store_secrets]]
binding = "PEPPER_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "TOKEN_PEPPER"

[[env.production.secrets_store_secrets]]
binding = "COMMUNICATION_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "COMMUNICATION_API_KEY"

[env.production.vars]
TIKO_ENVIRONMENT = "production"
ADMIN_EMAIL = "me@sil.mt"
IDENTITY_BASE_URL = "https://identity.tikoapi.org/v1"
APP_API_URL = "https://app.tikoapi.org/v1/apps"
GENERATION_API_URL = "https://generation.tikoapi.org/v1/generation"
MEDIA_API_URL = "https://media.tikoapi.org/v1"
COMMUNICATION_API_URL = "https://communication.tikoapi.org/v1/communication"
TRANSLATIONS_API_URL = "https://translations.tikoapi.org/v1"

[[env.production.triggers]]
crons = ["0 3 * * *"]

[[env.production.routes]]
pattern = "admin.tikoapi.org"
custom_domain = true

[[env.production.routes]]
pattern = "admin-api.tikotalks.com"
custom_domain = true
