name = "tiko-generation-api-dev"
main = "src/index.ts"
compatibility_date = "2026-05-27"
account_id = "8cef251b5fdcf6c6f63db98b7aa49f9a"
workers_dev = true

# P0 generation service. TTS is the first supported generation contract.
# Replace placeholder database_id before the first real deployment.

[[d1_databases]]
binding = "GENERATION_DB"
database_name = "tiko-generation-db-dev"
database_id = "230d0e88-5090-4281-86b4-29c88aaafd92"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "GENERATED_MEDIA_BUCKET"
bucket_name = "tiko-generated-media-dev"

[vars]
TIKO_ENVIRONMENT = "development"
GENERATION_PUBLIC_ROUTE = "https://dev.api.tikotalks.com/v1/generation"

# ── Production environment ──────────────────────────────────────
# Deploy with: npx wrangler deploy --env production

[env.production]
name = "tiko-generation-api"
workers_dev = false

[env.production.vars]
TIKO_ENVIRONMENT = "production"
GENERATION_PUBLIC_ROUTE = "https://api.tikotalks.com/v1/generation"

[[env.production.d1_databases]]
binding = "GENERATION_DB"
database_name = "tiko-generation-db"
database_id = "230d0e88-5090-4281-86b4-29c88aaafd92"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "GENERATED_MEDIA_BUCKET"
bucket_name = "tiko-generated-media"

[[env.production.routes]]
pattern = "api.tikotalks.com/v1/generation/*"
zone_name = "tikotalks.com"
