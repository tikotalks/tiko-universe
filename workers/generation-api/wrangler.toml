name = "tiko-generation-api-dev"
main = "src/index.ts"
compatibility_date = "2026-05-27"
account_id = "dc2b7d14a69351375cab6de9a13ddee9"
workers_dev = true

# P0 generation service. TTS, image generation, and story narration.

[[d1_databases]]
binding = "GENERATION_DB"
database_name = "tiko-image-generation"
database_id = "ab7cdbd1-e50a-4862-b8eb-681d263c3f66"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "GENERATED_MEDIA_BUCKET"
bucket_name = "tiko-generated-media"

[vars]
TIKO_ENVIRONMENT = "development"
GENERATION_PUBLIC_ROUTE = "https://dev-api.tikotalks.com/v1/generation"
IDENTITY_BASE_URL = "https://api.tikotalks.com/v1"
ATLAS_BASE_URL = "https://api.tikotalks.com/v1/atlas"

[[services]]
binding = "ATLAS_SERVICE"
service = "tiko-atlas-api-dev"

[[services]]
binding = "IDENTITY_SERVICE"
service = "tiko-identity-api-dev"

[[secrets_store_secrets]]
binding = "PEPPER_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "TOKEN_PEPPER"

[[secrets_store_secrets]]
binding = "OPENAI_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "OPENAI_API_KEY"

[[secrets_store_secrets]]
binding = "ELEVENLABS_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "ELEVENLABS_API_KEY"

[[secrets_store_secrets]]
binding = "ATLAS_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "ATLAS_API_KEY"

[[routes]]
pattern = "dev-api.tikotalks.com/v1/generation/*"
zone_name = "tikotalks.com"

# ── Production environment ──────────────────────────────────────
# Deploy with: npx wrangler deploy --env production

[env.production]
name = "tiko-generation-api"
workers_dev = false

[env.production.vars]
TIKO_ENVIRONMENT = "production"
GENERATION_PUBLIC_ROUTE = "https://api.tikotalks.com/v1/generation"
IDENTITY_BASE_URL = "https://identity.tikoapi.org/v1"
ATLAS_BASE_URL = "https://api.tikotalks.com/v1/atlas"

[[env.production.services]]
binding = "ATLAS_SERVICE"
service = "tiko-atlas-api"

[[env.production.services]]
binding = "IDENTITY_SERVICE"
service = "tiko-identity-api"

[[env.production.secrets_store_secrets]]
binding = "PEPPER_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "TOKEN_PEPPER"

[[env.production.secrets_store_secrets]]
binding = "OPENAI_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "OPENAI_API_KEY"

[[env.production.secrets_store_secrets]]
binding = "ELEVENLABS_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "ELEVENLABS_API_KEY"

[[env.production.secrets_store_secrets]]
binding = "ATLAS_SECRET"
store_id = "0ba6468063e04b779e529f5db651896b"
secret_name = "ATLAS_API_KEY"

[[env.production.d1_databases]]
binding = "GENERATION_DB"
database_name = "tiko-image-generation"
database_id = "ab7cdbd1-e50a-4862-b8eb-681d263c3f66"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "GENERATED_MEDIA_BUCKET"
bucket_name = "tiko-generated-media"

[[env.production.routes]]
pattern = "generation.tikoapi.org"
custom_domain = true

[[env.production.routes]]
pattern = "api.tikotalks.com/v1/generation/*"
zone_name = "tikotalks.com"
