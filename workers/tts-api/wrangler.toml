name = "tiko-tts-api-dev"
main = "src/index.ts"
compatibility_date = "2026-05-27"
account_id = "dc2b7d14a69351375cab6de9a13ddee9"
workers_dev = true

# Temporary compatibility Worker for the Yes No proof app.
# Long-term TTS ownership moves into workers/generation-api.

[[d1_databases]]
binding = "TTS_DB"
database_name = "tiko-image-generation"
database_id = "ab7cdbd1-e50a-4862-b8eb-681d263c3f66"

[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "tiko-tts-audio-dev"

[vars]
TIKO_ENVIRONMENT = "development"
TTS_PUBLIC_ROUTE = "https://dev.tts.tikotalks.com"

# ── Production environment ──────────────────────────────────────
# Temporary production route for Yes No compatibility.
# Deploy with: npx wrangler deploy --env production
# Remove after Yes No web/iOS migrate to generation-api.

[env.production]
name = "tiko-tts-api"
workers_dev = false

[env.production.vars]
TIKO_ENVIRONMENT = "production"
TTS_PUBLIC_ROUTE = "https://tts.tikotalks.com"

[[env.production.d1_databases]]
binding = "TTS_DB"
database_name = "tiko-image-generation"
database_id = "ab7cdbd1-e50a-4862-b8eb-681d263c3f66"

[[env.production.r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "tiko-tts-audio"

[[env.production.routes]]
pattern = "tts.tikotalks.com"
custom_domain = true
