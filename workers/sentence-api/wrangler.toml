name = "tiko-sentence-api-dev"
main = "src/index.ts"
compatibility_date = "2026-05-27"
account_id = "dc2b7d14a69351375cab6de9a13ddee9"
workers_dev = true

# Talk sentence-building API. Backend owns language packs, grammar, suggestions,
# saved phrases, and AI-powered word predictions with usage-based score blending.

# Nightly learning pass: folds click/usage data into transition weights and
# prediction scores (handleScheduled in src/index.ts).
[triggers]
crons = ["0 3 * * *"]

[vars]
TIKO_ENVIRONMENT = "development"
ALLOWED_ORIGINS = "https://talk.tikoapps.org,https://dev.talk.tikoapps.org,http://localhost:3066,http://localhost:5173,http://localhost:4173,capacitor://localhost,ionic://localhost,tiko://native"

[[d1_databases]]
binding = "DB"
database_name = "tiko-db"
database_id = "f99b61ae-6a78-4670-bb9c-cdc4f634264a"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "be881c5650874b7698c004f7d80eca1a"
preview_id = "be881c5650874b7698c004f7d80eca1a"

[[services]]
binding = "IDENTITY_SERVICE"
service = "tiko-identity-api-dev"

[[services]]
binding = "GENERATION_SERVICE"
service = "tiko-generation-api-dev"

[[services]]
binding = "ATLAS_SERVICE"
service = "tiko-atlas-api-dev"

[[routes]]
pattern = "dev.sentence.tikoapi.org"
custom_domain = true

# ── Production environment ──────────────────────────────────────
# Deploy with: npx wrangler deploy --env production after explicit approval.

[env.production]
name = "tiko-sentence-api"
workers_dev = false

[env.production.triggers]
crons = ["0 3 * * *"]

[env.production.vars]
TIKO_ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://talk.tikoapps.org,capacitor://localhost,ionic://localhost,tiko://native"

[[env.production.d1_databases]]
binding = "DB"
database_name = "tiko-sentence-db"
database_id = "f99b61ae-6a78-4670-bb9c-cdc4f634264a"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "126846bedae445ccb8fd60db72873c19"

[[env.production.services]]
binding = "IDENTITY_SERVICE"
service = "tiko-identity-api"

[[env.production.services]]
binding = "GENERATION_SERVICE"
service = "tiko-generation-api"

[[env.production.services]]
binding = "ATLAS_SERVICE"
service = "tiko-atlas-api"

[[env.production.routes]]
pattern = "sentence.tikoapi.org"
custom_domain = true

[[env.production.routes]]
pattern = "api.tikotalks.com/v1/sentence/*"
zone_name = "tikotalks.com"
