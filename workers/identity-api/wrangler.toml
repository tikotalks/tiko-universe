name = "tiko-identity-api-dev"
main = "src/index.ts"
compatibility_date = "2026-05-27"
account_id = "dc2b7d14a69351375cab6de9a13ddee9"
workers_dev = true

[vars]
ALLOWED_ORIGINS = "https://tiko.mt,https://www.tiko.mt,https://tiko.tikoapps.org,https://yesno.tikoapps.org,https://cards.tikoapps.org,https://sequence.tikoapps.org,https://type.tikoapps.org,https://timer.tikoapps.org,https://admin.tikoapps.org,https://dev.tiko.tikoapps.org,https://dev.yesno.tikoapps.org,https://dev.cards.tikoapps.org,https://dev.sequence.tikoapps.org,https://dev.type.tikoapps.org,https://dev.timer.tikoapps.org,https://dev.admin.tikoapps.org,http://localhost:3060,http://localhost:3061,http://localhost:3062,http://localhost:3063,http://localhost:3064,http://localhost:3065,http://localhost:5173,http://localhost:4173,capacitor://localhost,ionic://localhost,tiko://native"
MAGIC_LINK_BASE_URL = "https://api.tikotalks.com/v1/identity/magic"
COMMUNICATION_API_URL = "https://dev.api.tikotalks.com/v1/communication"
# Set TOKEN_PEPPER with `wrangler secret put TOKEN_PEPPER`; do not commit real token peppers.
# Set COMMUNICATION_API_KEY with `wrangler secret put COMMUNICATION_API_KEY`; do not commit real service keys.

[[d1_databases]]
binding = "IDENTITY_DB"
database_name = "tiko-identity"
database_id = "036a1726-ac16-48a9-ab76-22c3a88ca7ae"
migrations_dir = "migrations"

[[services]]
binding = "COMMUNICATION_SERVICE"
service = "tiko-communication-api-dev"

# ── Production environment ──────────────────────────────────────
# Deploy with: npx wrangler deploy --env production

[env.production]
name = "tiko-identity-api"
workers_dev = false

[env.production.vars]
ALLOWED_ORIGINS = "https://tiko.mt,https://www.tiko.mt,https://tiko.tikoapps.org,https://yesno.tikoapps.org,https://cards.tikoapps.org,https://sequence.tikoapps.org,https://type.tikoapps.org,https://timer.tikoapps.org,https://admin.tikoapps.org,http://localhost:3060,http://localhost:3061,http://localhost:3062,http://localhost:3063,http://localhost:3064,http://localhost:3065,http://localhost:5173,http://localhost:4173,capacitor://localhost,ionic://localhost,tiko://native"
MAGIC_LINK_BASE_URL = "https://identity.tikoapi.org/v1/identity/magic"
COMMUNICATION_API_URL = "https://communication.tikoapi.org/v1/communication"

[[env.production.d1_databases]]
binding = "IDENTITY_DB"
database_name = "tiko-identity"
database_id = "036a1726-ac16-48a9-ab76-22c3a88ca7ae"
migrations_dir = "migrations"

[[env.production.services]]
binding = "COMMUNICATION_SERVICE"
service = "tiko-communication-api"

[[env.production.routes]]
pattern = "identity.tikoapi.org"
custom_domain = true

[[env.production.routes]]
pattern = "api.tikotalks.com/v1/identity/*"
zone_name = "tikotalks.com"

[[env.production.routes]]
pattern = "id.tiko.mt/*"
zone_name = "tiko.mt"
