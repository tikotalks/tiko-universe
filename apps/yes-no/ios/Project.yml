name: TikoYesNo
options:
  bundleIdPrefix: mt.tiko
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
packages:
  TikoKit:
    path: ../../../packages/tikokit-ios
targets:
  TikoYesNo:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: TikoKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: mt.tiko.yesno
        INFOPLIST_FILE: Sources/Info.plist
  TikoYesNoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: TikoYesNo
