name: TikoRadio
options:
  bundleIdPrefix: mt.tiko
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
packages:
  TikoKit:
    path: ../../../packages/tikokit-ios
targets:
  TikoRadio:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: TikoKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: mt.tiko.radio
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/TikoRadio.entitlements
  TikoRadioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: TikoRadio
