name: Android Wrappers

on:
  pull_request:
    branches: [development, main]
    paths:
      - 'apps/*/android/**'
      - 'tools/android-wrappers.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-wrappers.yml'
  workflow_dispatch:
    inputs:
      app:
        description: Android wrapper to build
        required: true
        default: all
        type: choice
        options:
          - all
          - yes-no
          - cards
          - type
          - sequence
          - timer
          - todo
          - radio
          - talk

concurrency:
  group: android-wrappers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.app }} debug APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [yes-no, cards, type, sequence, timer, todo, radio, talk]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Install Android platform
        run: yes | sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - run: npm ci

      - name: Build wrapper
        if: github.event_name != 'workflow_dispatch' || inputs.app == 'all' || inputs.app == matrix.app
        run: npm run android:build -- ${{ matrix.app }}

      - name: Upload debug APK
        if: github.event_name != 'workflow_dispatch' || inputs.app == 'all' || inputs.app == matrix.app
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: tiko-${{ matrix.app }}-debug-apk
          path: apps/${{ matrix.app }}/android/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
