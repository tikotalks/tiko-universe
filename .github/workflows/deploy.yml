name: Deploy

on:
  push:
    branches: [development, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || 'dc2b7d14a69351375cab6de9a13ddee9' }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_PAGES_PROJECT_DEV: ${{ vars.CLOUDFLARE_PAGES_PROJECT_DEV }}
  CLOUDFLARE_PAGES_PROJECT_PROD: ${{ vars.CLOUDFLARE_PAGES_PROJECT_PROD }}
  CLOUDFLARE_PAGES_PROJECT_WEBSITE_DEV: ${{ vars.CLOUDFLARE_PAGES_PROJECT_WEBSITE_DEV }}
  CLOUDFLARE_PAGES_PROJECT_WEBSITE_PROD: ${{ vars.CLOUDFLARE_PAGES_PROJECT_WEBSITE_PROD }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      apps-changed: ${{ steps.detect.outputs.apps-changed }}
      workers-changed: ${{ steps.detect.outputs.workers-changed }}
      shared-changed: ${{ steps.detect.outputs.shared-changed }}
      deploy-all: ${{ steps.detect.outputs.deploy-all }}
      environment: ${{ steps.detect.outputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        run: |
          # Determine environment from branch
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=development" >> "$GITHUB_OUTPUT"
          fi

          # Get changed files vs previous commit (or merge base for PRs)
          if [[ "${{ github.event_name }}" == "push" ]]; then
            PREVIOUS="${{ github.event.before }}"
            # Handle initial push or force push (all-zero sha)
            if [[ "$PREVIOUS" == "0000000000000000000000000000000000000000" ]] || ! git rev-parse "$PREVIOUS" >/dev/null 2>&1; then
              echo "⚠️ Cannot resolve previous commit — deploying everything"
              CHANGES=$(git diff --name-only $(git rev-list --max-parents=0 HEAD) "$GITHUB_SHA")
            else
              CHANGES=$(git diff --name-only "$PREVIOUS" "$GITHUB_SHA")
            fi
          else
            git fetch origin ${{ github.base_ref }}
            CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGES"

          # Deployable app workspaces. Keep this aligned with apps/*/web package directories
          # that have real Cloudflare Pages projects.
          APPS="admin cards media radio sequence timer todo type website yes-no"
          # Worker directories
          WORKERS="admin-api app-api content-api generation-api identity-api media-api tts-api"
          # Shared package paths
          SHARED_PATHS="packages/ workers/shared/"

          apps_changed=()
          workers_changed=()
          shared_changed="false"

          # Check shared packages first
          for shared_path in $SHARED_PATHS; do
            if echo "$CHANGES" | grep -q "^$shared_path"; then
              shared_changed="true"
              break
            fi
          done

          # Also check root config changes as shared
          if echo "$CHANGES" | grep -qE "^(package\.json|package-lock\.json|tsconfig|vitest|playwright|\.github/workflows/deploy\.yml)"; then
            shared_changed="true"
          fi

          # Detect changed apps
          for app in $APPS; do
            if echo "$CHANGES" | grep -q "^apps/$app/"; then
              apps_changed+=("$app")
            fi
          done

          # Detect changed workers
          for worker in $WORKERS; do
            if echo "$CHANGES" | grep -q "^workers/$worker/"; then
              workers_changed+=("$worker")
            fi
          done

          apps_json=$(node -e "console.log(JSON.stringify(process.argv.slice(1).filter(Boolean)))" "${apps_changed[@]}")
          workers_json=$(node -e "console.log(JSON.stringify(process.argv.slice(1).filter(Boolean)))" "${workers_changed[@]}")

          echo "apps-changed=$apps_json" >> "$GITHUB_OUTPUT"
          echo "workers-changed=$workers_json" >> "$GITHUB_OUTPUT"
          echo "shared-changed=$shared_changed" >> "$GITHUB_OUTPUT"

          if [[ "$shared_changed" == "true" ]]; then
            echo "deploy-all=true" >> "$GITHUB_OUTPUT"
            echo "📋 Shared packages changed — will deploy all apps and workers"
          else
            echo "deploy-all=false" >> "$GITHUB_OUTPUT"
            echo "🎯 Selective deploy — apps: $apps_json workers: $workers_json"
          fi

  deploy-apps:
    name: Deploy Apps
    needs: detect-changes
    if: needs.detect-changes.outputs.apps-changed != '[]' || needs.detect-changes.outputs.deploy-all == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.deploy-all == 'true' && '["admin","cards","media","radio","sequence","timer","todo","type","website","yes-no"]' || needs.detect-changes.outputs.apps-changed) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build ${{ matrix.app }}
        run: npm run build --workspace=apps/${{ matrix.app }}/web

      - name: Deploy ${{ matrix.app }} to Cloudflare Pages
        run: |
          APP="${{ matrix.app }}"
          ENV="${{ needs.detect-changes.outputs.environment }}"

          # Determine Pages project name
          if [[ "$APP" == "website" ]]; then
            if [[ "$ENV" == "production" ]]; then
              PROJECT="${CLOUDFLARE_PAGES_PROJECT_WEBSITE_PROD:-${CLOUDFLARE_PAGES_PROJECT_PROD:-tikotalks}}"
              BRANCH="main"
            else
              PROJECT="${CLOUDFLARE_PAGES_PROJECT_WEBSITE_DEV:-${CLOUDFLARE_PAGES_PROJECT_DEV:-tikotalks-dev}}"
              BRANCH="development"
            fi
          elif [[ "$ENV" == "production" ]]; then
            PROJECT="tiko-${APP}"
            BRANCH="main"
          else
            PROJECT="tiko-${APP}-dev"
            BRANCH="development"
          fi

          # Pages deployments require the project to exist. This is idempotent in CI:
          # existing projects fail the create command, then deploy verifies the real state.
          npx wrangler pages project create "$PROJECT" --production-branch="$BRANCH" || true

          # Deploy via Wrangler Pages
          npx wrangler pages deploy apps/${APP}/web/dist \
            --project-name="$PROJECT" \
            --branch="$BRANCH" \
            --commit-dirty=true \
            --commit-message="deploy ${APP} from ${GITHUB_SHA::7}"

  deploy-workers:
    name: Deploy Workers
    needs: detect-changes
    if: needs.detect-changes.outputs.workers-changed != '[]' || needs.detect-changes.outputs.deploy-all == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.detect-changes.outputs.deploy-all == 'true' && '["admin-api","app-api","content-api","generation-api","identity-api","media-api","tts-api"]' || needs.detect-changes.outputs.workers-changed) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy ${{ matrix.worker }}
        run: |
          WORKER="${{ matrix.worker }}"
          ENV="${{ needs.detect-changes.outputs.environment }}"

          # Check if worker has actual deploy capability (not scaffold-only)
          DEPLOY_DRY=$(node -e "
            try {
              const pkg = require('./workers/${WORKER}/package.json');
              const script = pkg.scripts && pkg.scripts['deploy:dry-run'];
              console.log(script && !script.includes('scaffold-only') ? 'true' : 'false');
            } catch(e) { console.log('false'); }
          ")

          if [[ "$DEPLOY_DRY" != "true" ]]; then
            echo "⏭️ $WORKER is scaffold-only, skipping deploy"
            exit 0
          fi

          # For dev: use dev worker name from wrangler.toml or fallback
          cd "workers/${WORKER}"

          if [[ "$ENV" == "production" ]]; then
            echo "🚀 Deploying $WORKER to production"
            npx wrangler deploy --env production
          else
            echo "🧪 Deploying $WORKER to development (dry-run to verify, then deploy)"
            npx wrangler deploy --dry-run --outdir dist 2>&1 || true
            # Actual dev deploy
            npx wrangler deploy
          fi

