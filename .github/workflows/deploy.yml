name: Deploy

on:
  push:
    branches: [development, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || '8cef251b5fdcf6c6f63db98b7aa49f9a' }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      apps-changed: ${{ steps.detect.outputs.apps-changed }}
      workers-changed: ${{ steps.detect.outputs.workers-changed }}
      shared-changed: ${{ steps.detect.outputs.shared-changed }}
      deploy-all: ${{ steps.detect.outputs.deploy-all }}
      environment: ${{ steps.detect.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: detect
        run: |
          # Determine environment from branch
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=development" >> "$GITHUB_OUTPUT"
          fi

          # Get changed files vs previous commit (or merge base for PRs)
          if [[ "${{ github.event_name }}" == "push" ]]; then
            PREVIOUS="${{ github.event.before }}"
            # Handle initial push or force push
            if ! git rev-parse "$PREVIOUS" >/dev/null 2>&1; then
              PREVIOUS=$(git rev-list --max-parents=0 HEAD)
            fi
            CHANGES=$(git diff --name-only "$PREVIOUS" "$GITHUB_SHA")
          else
            CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGES"

          # App directories
          APPS="cards clock docs radio sequence timer todo type website yes-no"
          # Worker directories
          WORKERS="admin-api app-api content-api generation-api identity-api media-api tts-api"
          # Shared package paths
          SHARED_PATHS="packages/ workers/shared/"

          apps_changed=""
          workers_changed=""
          shared_changed="false"

          # Check shared packages first
          for shared_path in $SHARED_PATHS; do
            if echo "$CHANGES" | grep -q "^$shared_path"; then
              shared_changed="true"
              break
            fi
          done

          # Also check root config changes as shared
          if echo "$CHANGES" | grep -qE "^(package\.json|package-lock\.json|tsconfig|vitest|playwright)"; then
            shared_changed="true"
          fi

          # Detect changed apps
          for app in $APPS; do
            if echo "$CHANGES" | grep -q "^apps/$app/"; then
              if [[ -n "$apps_changed" ]]; then
                apps_changed="$apps_changed,$app"
              else
                apps_changed="$app"
              fi
            fi
          done

          # Detect changed workers
          for worker in $WORKERS; do
            if echo "$CHANGES" | grep -q "^workers/$worker/"; then
              if [[ -n "$workers_changed" ]]; then
                workers_changed="$workers_changed,$worker"
              else
                workers_changed="$worker"
              fi
            fi
          done

          echo "apps-changed=$apps_changed" >> "$GITHUB_OUTPUT"
          echo "workers-changed=$workers_changed" >> "$GITHUB_OUTPUT"
          echo "shared-changed=$shared_changed" >> "$GITHUB_OUTPUT"

          if [[ "$shared_changed" == "true" ]]; then
            echo "deploy-all=true" >> "$GITHUB_OUTPUT"
            echo "📋 Shared packages changed — will deploy all apps and workers"
          else
            echo "deploy-all=false" >> "$GITHUB_OUTPUT"
            echo "🎯 Selective deploy — apps: [$apps_changed] workers: [$workers_changed]"
          fi

  deploy-apps:
    name: Deploy Apps
    needs: detect-changes
    if: needs.detect-changes.outputs.apps-changed != '' || needs.detect-changes.outputs.deploy-all == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.deploy-all == 'true' && '["cards","clock","docs","radio","sequence","timer","todo","type","website","yes-no"]' || format('["{0}"]', needs.detect-changes.outputs.apps-changed)) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build ${{ matrix.app }}
        run: npm run build --workspace=apps/${{ matrix.app }}/web

      - name: Deploy ${{ matrix.app }} to Cloudflare Pages
        run: |
          APP="${{ matrix.app }}"
          ENV="${{ needs.detect-changes.outputs.environment }}"

          # Determine Pages project name
          if [[ "$ENV" == "production" ]]; then
            PROJECT="tiko-${APP}"
            BRANCH="main"
          else
            PROJECT="tiko-${APP}-dev"
            BRANCH="development"
          fi

          # Deploy via Wrangler Pages
          npx wrangler pages deploy apps/${APP}/web/dist \
            --project-name="$PROJECT" \
            --branch="$BRANCH" \
            --commit-dirty=true \
            --commit-message="deploy ${APP} from ${GITHUB_SHA::7}"

  deploy-workers:
    name: Deploy Workers
    needs: detect-changes
    if: needs.detect-changes.outputs.workers-changed != '' || needs.detect-changes.outputs.deploy-all == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.detect-changes.outputs.deploy-all == 'true' && '["admin-api","app-api","content-api","generation-api","identity-api","media-api","tts-api"]' || format('["{0}"]', needs.detect-changes.outputs.workers-changed)) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy ${{ matrix.worker }}
        run: |
          WORKER="${{ matrix.worker }}"
          ENV="${{ needs.detect-changes.outputs.environment }}"

          # Check if worker has actual deploy capability (not scaffold-only)
          SCRIPTS=$(node -e "
            try {
              const pkg = require('./workers/${WORKER}/package.json');
              console.log(JSON.stringify(Object.keys(pkg.scripts || {})));
            } catch(e) { console.log('[]'); }
          ")

          DEPLOY_DRY=$(echo "$SCRIPTS" | node -e "
            const keys = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            process.exit(keys.includes('deploy:dry-run') ? 0 : 1);
          " 2>/dev/null)

          if [[ "$DEPLOY_DRY" -ne 0 ]]; then
            echo "⏭️ $WORKER is scaffold-only, skipping deploy"
            exit 0
          fi

          # For dev: use dev worker name from wrangler.toml or fallback
          cd "workers/${WORKER}"

          if [[ "$ENV" == "production" ]]; then
            echo "🚀 Deploying $WORKER to production"
            npx wrangler deploy
          else
            echo "🧪 Deploying $WORKER to development (dry-run to verify, then deploy)"
            npx wrangler deploy --dry-run --outdir dist 2>&1 || true
            # Actual dev deploy
            npx wrangler deploy
          fi
